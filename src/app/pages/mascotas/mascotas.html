<div class="div-escritorio">
  <svg width="0" height="0" style="position: absolute; pointer-events: none">
    <filter id="grunge-filter">
      <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="3" result="noise" />
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="15" />
    </filter>
  </svg>

  <section class="section-adopcion p-8 md:p-14">
    <div class="div-textura-papel"></div>

    <header class="header-adopcion border-b-8 border-black pb-6 mb-12 relative z-10">
      <h1
        class="title-adopcion text-6xl md:text-8xl font-black uppercase italic tracking-tighter text-center"
      >
        The Gray Gazette
      </h1>
      <div
        class="div-adopcion flex justify-between border-t-2 border-black mt-2 font-bold text-[10px] md:text-xs uppercase pt-1"
      >
        <span>Edición Especial de Rescate</span>
        <span>ID: 2026-X</span>
        <span>Sin Costo</span>
      </div>
    </header>

    <main class="main-adopcion columns-1 md:columns-2 gap-12 space-y-16 relative z-10">
      @for (animal of listaAnimales; track animal.id) {
        <article
          class="article-adopcion break-inside-avoid border-b-2 border-black pb-10 group"
          [style.animation-delay]="$index * 0.2 + 0.8 + 's'"
        >
          <h2
            class="title-adopcion text-4xl font-bold mb-4 uppercase leading-none group-hover:tracking-widest transition-all duration-500"
          >
            {{ animal.nombre }}
          </h2>

          <div
            class="div-adopcion border-4 border-black bg-white p-1 mb-6 shadow-[8px_8px_0px_0px_rgba(0,0,0,0.9)] overflow-hidden"
          >
            <img
              [src]="animal.imagen"
              [alt]="animal.nombre"
              class="img-adopcion w-full h-auto grayscale brightness-90 group-hover:brightness-110 group-hover:scale-110 transition-all duration-700"
            />
          </div>

          <div class="div-adopcion">
            <p
              class="text-adopcion text-xl leading-tight text-justify first-letter:text-6xl first-letter:font-bold first-letter:mr-2 first-letter:float-left"
            >
              {{ animal.descripcion }}
            </p>
          </div>

          <footer class="footer-adopcion mt-8">
            <button
              class="button-adopcion w-full py-3 font-bold uppercase tracking-widest text-base"
              (click)="abrirModalAdopcion(animal)"
            >
              ADOPTAR
            </button>
          </footer>
        </article>
      }
    </main>

    <footer
      class="footer-adopcion mt-20 pt-8 border-t-4 border-black text-center italic text-xs relative z-10"
    >
      <p>Impreso en los talleres de la Universidad. Fin de la edición.</p>
    </footer>
  </section>
</div>
