name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

concurrency:
  group: 'pages'
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Instalar dependencias
        run: npm install

      - name: Construir la aplicación (Build)
        run: |
          npx ng build --base-href /
          echo "petzootik.site" > dist/ProyectoPetZooTikFront/browser/CNAME
          cp dist/ProyectoPetZooTikFront/browser/index.html dist/ProyectoPetZooTikFront/browser/404.html

      - name: Subir el artefacto
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/ProyectoPetZooTikFront/browser

      - name: Desplegar en GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4